name: Dual Keep-Alive (Backend + Supabase)

on:
  schedule:
    # Runs every 14 minutes.
    # Why 14 mins? Render free tier spins down after 15 mins of inactivity.
    # By hitting the backend every 14 mins, we keep Render awake AND
    # the backend hits Supabase, keeping the database awake too.
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  ping_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Keep-Alive Endpoint
        run: |
          # Replace this URL with your actual production backend URL
          # E.g., https://docbrief-server.onrender.com/keep-alive
          BACKEND_URL="https://docbrief-server.onrender.com/keep-alive"
          
          echo "Pinging backend at $BACKEND_URL..."
          
          # -s: silent, -f: fail silently on HTTP errors so curl returns non-zero, --max-time: timeout
          response=$(curl -s -f --max-time 10 "$BACKEND_URL")
          
          # The backend will return a JSON indicating if both it and Supabase are awake
          echo "Backend Response: $response"
          
          # If curl failed
          if [ $? -ne 0 ]; then
            echo "Failed to reach backend."
            exit 1
          fi
